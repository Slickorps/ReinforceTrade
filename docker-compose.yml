version: '3.8'

services:
  # --- Main Trading Bot (Python) ---
  reinforcetrade:
    build: .
    container_name: reinforcetrade
    environment:
      - DATABASE_URL=sqlite:///data/reinforcetrade.db
      - LOG_LEVEL=INFO
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY}
      - EXCHANGE_SECRET=${EXCHANGE_SECRET}
      - EXCHANGE_NAME=${EXCHANGE_NAME:-binance}
      - MONITOR_ENABLED=true
      - MONITOR_AGENT_URL=http://monitor-agent:9090
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./models:/app/models
    command: python trading_bot.py
    restart: unless-stopped
    networks:
      - reinforcetrade-network

  # --- Go Monitoring Agent ---
  monitor-agent:
    image: golang:1.22-alpine
    container_name: reinforcetrade-monitor
    ports:
      - "9090:9090"
    environment:
      - MONITOR_PORT=:9090
    volumes:
      - ./monitor:/go/src/monitor
    working_dir: /go/src/monitor
    command: >
      sh -c "go build -o /tmp/monitor-agent . && /tmp/monitor-agent"
    restart: unless-stopped
    networks:
      - reinforcetrade-network

  # --- Redis for Caching ---
  redis:
    image: redis:7-alpine
    container_name: reinforcetrade-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - reinforcetrade-network

  # --- Prometheus Metrics (Monitoring Stack) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: reinforcetrade-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - reinforcetrade-network

  # --- Jupyter Notebook for Analysis ---
  jupyter:
    build: .
    container_name: reinforcetrade-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./notebooks:/app/notebooks
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    networks:
      - reinforcetrade-network

volumes:
  redis-data:
  prometheus-data:

networks:
  reinforcetrade-network:
    driver: bridge